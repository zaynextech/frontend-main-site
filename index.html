<!doctype html>
<html lang="en">
  <head>

    <!-- ================================================= -->
    <!-- BASIC -->
    <!-- ================================================= -->

    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta
      name="theme-color"
      content="#030303"
    />

    <!-- ================================================= -->
    <!-- PRIMARY SEO -->
    <!-- ================================================= -->

    <title>
      Zaynex — Websites & Digital Solutions for Modern Businesses
    </title>

    <meta
      name="description"
      content="Helping businesses build a strong online presence with modern websites and digital solutions."
    />

    <meta
      name="keywords"
      content="
        Zaynex,
        Web Development,
        Digital Solutions,
        Business Websites,
        UI UX,
        SEO,
        Web Applications,
        LMS Platforms,
        E-commerce,
        Branding,
        Dashboard Systems,
        Modern Websites
      "
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <meta
      name="author"
      content="Zaynex"
    />

    <!-- ================================================= -->
    <!-- CANONICAL -->
    <!-- ================================================= -->

    <link
      rel="canonical"
      href="https://www.zaynex.tech"
    />

    <!-- ================================================= -->
    <!-- FAVICONS -->
    <!-- ================================================= -->

    <!-- Browser Tab Icon -->
    <link
      rel="icon"
      type="image/x-icon"
      href="/favicon.ico"
    />

    <!-- Apple Devices -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />

    <!-- ================================================= -->
    <!-- OPEN GRAPH -->
    <!-- ================================================= -->

    <!-- WhatsApp / Facebook / LinkedIn Preview -->

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:site_name"
      content="Zaynex"
    />

    <meta
      property="og:title"
      content="Zaynex — Websites & Digital Solutions for Modern Businesses"
    />

    <meta
      property="og:description"
      content="Helping businesses build a strong online presence with modern websites and digital solutions."
    />

    <meta
      property="og:url"
      content="https://www.zaynex.tech"
    />

    <!-- MAIN SHARE IMAGE -->
    <!-- SIZE: 1200x630 -->
    <meta
      property="og:image"
      content="https://www.zaynex.tech/og-image.jpg"
    />

    <meta
      property="og:image:width"
      content="1200"
    />

    <meta
      property="og:image:height"
      content="630"
    />

    <meta
      property="og:image:type"
      content="image/jpeg"
    />

    <!-- ================================================= -->
    <!-- TWITTER / X -->
    <!-- ================================================= -->

    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Zaynex — Websites & Digital Solutions for Modern Businesses"
    />

    <meta
      name="twitter:description"
      content="Helping businesses build a strong online presence with modern websites and digital solutions."
    />

    <meta
      name="twitter:image"
      content="https://www.zaynex.tech/og-image.jpg"
    />

    <!-- ================================================= -->
    <!-- GOOGLE VERIFICATION -->
    <!-- ================================================= -->

    <!-- Replace with your real Google Search Console code -->
    <!--
    <meta
      name="google-site-verification"
      content="YOUR_CODE"
    />
    -->

  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
